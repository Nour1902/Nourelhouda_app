<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin - Nour El Houda</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&amp;family=Lato:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background: #f0ebe0;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 220px;
            background: #1b3d2b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
        }
        .sidebar-logo {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo .moon { font-size: 22px; }
        .sidebar-logo-text .arabic {
            font-family: 'Amiri', serif;
            font-size: 15px;
            color: #f5f0e6;
        }
        .sidebar-logo-text .latin {
            font-size: 9px;
            letter-spacing: 2px;
            color: #a8d5b8;
            font-weight: 700;
        }
        .sidebar-badge {
            margin: 16px 16px 8px;
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 1px;
            text-align: center;
        }
        .sidebar-nav { flex: 1; padding: 8px 0; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #a8d5b8;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.08);
            color: #f5f0e6;
        }
        .nav-item.active {
            background: rgba(255,255,255,0.12);
            color: #f5f0e6;
            border-left: 3px solid #ffd700;
        }
        .nav-item .nav-icon { font-size: 16px; }
        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 8px 16px;
        }
        .profile-wrap {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 10px;
            transition: background 0.2s;
        }
        .profile-btn:hover { background: rgba(255,255,255,0.08); }
        .profile-avatar {
            width: 36px; height: 36px;
            background: #2d7a50;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .profile-info .profile-name {
            font-size: 13px; font-weight: 700; color: #f5f0e6;
        }
        .profile-info .profile-role {
            font-size: 10px; color: #ffd700; font-weight: 600;
        }
        .profile-dropdown {
            display: none;
            position: absolute;
            bottom: 70px; left: 16px; right: 16px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .profile-wrap:hover .profile-dropdown { display: block; }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #2a3a2a;
            text-decoration: none;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            font-family: 'Lato', sans-serif;
        }
        .dropdown-item:hover { background: #f0ebe0; }
        .dropdown-item.logout { color: #c0392b; border-top: 1px solid #f0ebe0; }
        .main-content {
            margin-left: 220px;
            flex: 1;
            padding: 32px;
        }
    </style>
    <ui:insert name="styles"/>
</h:head>

<h:body>
    <div style="display:flex;">

        <!-- ═══════════ SIDEBAR ═══════════ -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <span class="moon">🌙</span>
                <div class="sidebar-logo-text">
                    <div class="arabic">نور الهدى</div>
                    <div class="latin">NOUR EL HOUDA</div>
                </div>
            </div>

            <div class="sidebar-badge">👑 ADMINISTRATION</div>

            <nav class="sidebar-nav">
                <a href="dashboardAdmin.xhtml"
                   class="nav-item #{request.servletPath.contains('dashboardAdmin') ? 'active' : ''}">
                    <span class="nav-icon">📊</span> Dashboard
                </a>
                <div class="nav-divider"/>
                <a href="adminUsers.xhtml"
                   class="nav-item #{request.servletPath.contains('adminUsers') ? 'active' : ''}">
                    <span class="nav-icon">👥</span> Utilisateurs
                </a>
                <a href="adminCitations.xhtml"
                   class="nav-item #{request.servletPath.contains('adminCitations') ? 'active' : ''}">
                    <span class="nav-icon">💬</span> Citations
                </a>
                <a href="adminActes.xhtml"
                   class="nav-item #{request.servletPath.contains('adminActes') ? 'active' : ''}">
                    <span class="nav-icon">📖</span> Actes
                </a>
                <a href="adminConseils.xhtml"
                   class="nav-item #{request.servletPath.contains('adminConseils') ? 'active' : ''}">
                    <span class="nav-icon">💡</span> Conseils
                </a>

            </nav>

            <!-- Profile + Déconnexion -->
            <div class="profile-wrap">
                <div class="profile-btn">
                    <div class="profile-avatar">👑</div>
                    <div class="profile-info">
                        <div class="profile-name">
                            <h:outputText value="#{authBean.user.prenom}"/>
                        </div>
                        <div class="profile-role">Administrateur</div>
                    </div>
                </div>
                <div class="profile-dropdown">
                    <a href="profil.xhtml" class="dropdown-item">👤 Mon Profil</a>
                    <h:form style="margin:0;">
                        <h:commandButton value="🚪 Déconnexion"
                                         styleClass="dropdown-item logout"
                                         action="#{authBean.Deconnecter}"/>
                    </h:form>
                </div>
            </div>
        </div>

        <!-- ═══════════ CONTENU DE LA PAGE ═══════════ -->
        <div class="main-content">

            <!-- ── HEADER BIENVENUE ── -->
            <div style="background:#1b3d2b; border-radius:16px; padding:24px 32px;
                        display:flex; align-items:center; justify-content:space-between;
                        margin-bottom:32px;">
                <div>
                    <div style="font-family:'Amiri',serif; font-size:28px;
                                color:#f5f0e6; margin-bottom:6px;">
                        مرحباً بك 🌿
                    </div>
                    <div style="font-size:13px; color:#a8d5b8; font-weight:600;">
                        Tableau de bord —
                        <h:outputText value="#{authBean.user.prenom} #{authBean.user.nom}"/>
                    </div>
                </div>
                <div style="font-size:48px;">🕌</div>
            </div>

            <!-- ── CONTENU DE LA PAGE ── -->
            <ui:insert name="content"/>

        </div>

    </div>
</h:body>
</html>

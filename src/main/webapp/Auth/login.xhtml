<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:pt="http://xmlns.jcp.org/jsf/passthrough">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nour El Houda - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&amp;family=Lato:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            min-height: 100vh;
            background: #1b3d2b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Lato', sans-serif;
            padding: 20px;
        }

        form {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .card {
            background: #f5f0e6;
            border-radius: 22px;
            padding: 36px 32px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.45);
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 26px;
            gap: 5px;
        }
        .logo-circle {
            width: 62px; height: 62px;
            background: #1b3d2b;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
            margin-bottom: 6px;
        }
        .logo-arabic {
            font-family: 'Amiri', serif;
            font-size: 24px;
            color: #1b3d2b;
            direction: rtl;
        }
        .logo-latin {
            font-size: 11px;
            letter-spacing: 3px;
            color: #2d7a50;
            font-weight: 700;
        }
        .logo-subtitle {
            font-size: 12px;
            color: #8a9a8a;
            font-style: italic;
        }

        .tabs {
            display: flex;
            background: #e6dfd0;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 26px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #8a9a8a;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab-btn.active {
            background: #1b3d2b;
            color: #f5f0e6;
        }

        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #4a5a4a;
            margin-bottom: 7px;
        }

        /* ✅ CORRECTION : JSF entoure les inputs dans des spans */
        .field input,
        .field span,
        .field span input {
            display: block;
            width: 100%;
            padding: 13px 15px;
            border: 1.5px solid #ddd5c5;
            border-radius: 10px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            color: #2a3a2a;
            background: #fff;
            outline: none;
            box-sizing: border-box;
        }
        .field span {
            padding: 0;
            border: none;
            background: transparent;
            border-radius: 0;
        }
        .field input:focus,
        .field span input:focus { border-color: #2d7a50; }
        .field input::placeholder,
        .field span input::placeholder { color: #c0c8c0; }

        input[type="submit"],
        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background: #1b3d2b;
            color: #f5f0e6;
            border: none;
            border-radius: 12px;
            font-family: 'Lato', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }
        input[type="submit"]:hover,
        .btn-submit:hover { background: #2d7a50; }

        .msg-error {
            background: #fdecea;
            border: 1px solid #f5c6c6;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #c0392b;
            margin-bottom: 14px;
            display: block;
        }
    </style>
</h:head>

<h:body>
    <h:form id="formLogin">
        <div class="card">

            <div class="logo-wrap">
                <div class="logo-circle">🌙</div>
                <div class="logo-arabic">نور الهدى</div>
                <div class="logo-latin">NOUR EL HOUDA</div>
                <div class="logo-subtitle">"La Lumière du Chemin Droit"</div>
            </div>

            <div class="tabs">
                <span class="tab-btn active">Connexion</span>
                <!-- ✅ CORRECTION : lien vers register sans h:form -->
                <a href="register.xhtml" class="tab-btn">Inscription</a>
            </div>

            <h:messages globalOnly="true" styleClass="msg-error"
                        showSummary="true" showDetail="true"/>

            <div class="field">
                <label>Email</label>
                <h:inputText value="#{authBean.user.email}"
                             pt:placeholder="votre@email.com"
                             required="true"/>
            </div>

            <div class="field">
                <label>Mot de passe</label>
                <h:inputSecret value="#{authBean.user.password}"
                               pt:placeholder="••••••••"
                               required="true"/>
            </div>

            <h:commandButton value="Se connecter 🌙"
                             styleClass="btn-submit"
                             action="#{authBean.Connecter}"/>
        </div>
    </h:form>
</h:body>
</html>
